<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 110" width="470" height="110" role="img" aria-label="LocalMind">
  <defs>
    <linearGradient id="lm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- monogram badge -->
  <rect x="6" y="19" width="72" height="72" rx="18" fill="url(#lm-grad)"/>
  <text x="42" y="65" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="32" font-weight="700" fill="#0b0c0e">LM</text>
  <!-- wordmark -->
  <text x="96" y="71"
        font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="50" font-weight="700" letter-spacing="-1.5" fill="url(#lm-grad)">LocalMind</text>
</svg>
