<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 96" width="520" height="96" role="img" aria-label="LocalMind">
  <defs>
    <linearGradient id="lm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- centered wordmark: text-anchor=middle guarantees horizontal centering -->
  <text x="260" y="48" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="58" font-weight="700" letter-spacing="-2" fill="url(#lm-grad)">LocalMind</text>
</svg>
