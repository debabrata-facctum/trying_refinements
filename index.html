<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>LocalMind</span>
            </div>
            <div class="header-controls">
                <div class="status-indicator" id="status-indicator" title="Checking connection..."></div>
                <button id="settings-btn" class="icon-btn" aria-label="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <main class="chat-area" id="chat-area">
            <div class="welcome-message">
                <h1>Welcome to LocalMind</h1>
                <p>Your private, local AI assistant. Connects to a local model by default.</p>
            </div>
            <!-- Messages will appear here -->
        </main>

        <footer class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="send-btn" aria-label="Send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" id="close-settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="api-url">API Endpoint</label>
                    <input type="text" id="api-url" value="http://localhost:8080/api/chat"
                        placeholder="http://localhost:8080/api/chat">
                    <small>Default is set to your local FastAPI server.</small>
                </div>
                <div class="form-group">
                    <label for="model-name">Model Name</label>
                    <input type="text" id="model-name" value="llama3" placeholder="e.g., llama3, mistral">
                </div>
                <div class="form-group">
                    <label for="system-prompt">System Prompt</label>
                    <textarea id="system-prompt" rows="3"
                        placeholder="You are a helpful assistant.">You are a helpful AI assistant.</textarea>
                </div>

                <div class="form-group">
                    <label for="model-path-input">Model Path</label>
                    <div class="input-row">
                        <input type="text" id="model-path-input" readonly placeholder="No model selected...">
                        <button id="pick-model-btn" class="secondary-btn">Pick Model</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="n-ctx-input">Context Window (n_ctx)</label>
                    <input type="number" id="n-ctx-input" value="2048" min="128" step="128">
                </div>
                <div class="form-group">
                    <label for="n-threads-input">Threads (n_threads)</label>
                    <input type="number" id="n-threads-input" value="10" min="1" step="1">
                </div>
                <div class="form-group">
                    <label for="n-gpu-layers-input">GPU Layers (n_gpu_layers)</label>
                    <input type="number" id="n-gpu-layers-input" value="20" min="0" step="1">
                </div>
                <div class="form-group">
                    <button id="load-model-btn" class="primary-btn">Load Model</button>
                    <p id="model-status-text" class="model-status">No model loaded</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="reset-settings" class="secondary-btn">Reset to Default</button>
                <button id="save-settings" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="file-browser-modal">
        <div class="modal file-browser">
            <div class="modal-header">
                <h2>Select Model File</h2>
                <button class="close-btn" id="close-browser-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="browser-nav">
                <button id="browser-go-up-btn" class="secondary-btn">⬆ Go Up</button>
                <span id="browser-current-path" class="browser-path">/</span>
            </div>
            <div class="browser-list" id="browser-entries">
                <!-- Directory and file entries will be populated here -->
            </div>
        </div>
    </div>

    <script src="script.js?v=2.1"></script>
</body>

</html>
